name: GeoPlugin
version: '1.0.0'
main: me.palgato.geoplugin.GeoPlugin
api-version: '1.20'
author: palgato
description: Advanced GeoIP plugin with country-based access control, VPN detection, and webhooks
softdepend: [PlaceholderAPI]

commands:
  geoplugin:
    description: Main GeoPlugin command
    usage: /<command> [help|reload|countrycheck|vpncheck|ip|list|stats|notify]
    aliases: [geo]
    permission: geoplugin.use

permissions:
  geoplugin.*:
    description: Grants all features including bypass permissions (OP by default)
    default: op
    children:
      geoplugin.use: true
      geoplugin.admin: true
      geoplugin.reload: true
      geoplugin.countrycheck: true
      geoplugin.vpncheck: true
      geoplugin.ip: true
      geoplugin.list: true
      geoplugin.stats: true
      geoplugin.notify: true
      geoplugin.bypass: true
  
  geoplugin.use:
    description: Allows basic usage of /geoplugin command
    default: op
  
  geoplugin.admin:
    description: Full administrative access to commands (does not include bypass)
    default: op
    children:
      geoplugin.use: true
      geoplugin.reload: true
      geoplugin.countrycheck: true
      geoplugin.vpncheck: true
      geoplugin.ip: true
      geoplugin.list: true
      geoplugin.stats: true
      geoplugin.notify: true
  
  geoplugin.reload:
    description: Reload plugin configuration
    default: op
  
  geoplugin.countrycheck:
    description: Check country code for IP addresses or players
    default: op
  
  geoplugin.vpncheck:
    description: Check if an IP or player is using VPN/Proxy
    default: op
  
  geoplugin.ip:
    description: Get player IP address with copy function
    default: op
  
  geoplugin.list:
    description: List all online players with their countries
    default: op
  
  geoplugin.stats:
    description: View country connection statistics
    default: op
  
  geoplugin.notify:
    description: Toggle blocked connection notifications
    default: op
  
  geoplugin.bypass:
    description: Bypass country access control and VPN detection
    default: false
  
  geoplugin.bypass.country:
    description: Bypass country-based access control only
    default: false
  
  geoplugin.bypass.vpn:
    description: Bypass VPN detection only
    default: false