# ============================================================
#                    GeoPlugin Configuration
# ============================================================

# Log player connections with their country code to console
# Set to true to see messages like: "PlayerName connected from: US"
log-player-connections: true

# ============================================================
#              Country Access Control System
# ============================================================
country-access-control:
  # Enable or disable the access control system
  # When disabled, all players can join regardless of their country
  enabled: false
  
  # Access control mode: 'whitelist' or 'blacklist'
  # - whitelist: Only players from listed countries can join
  # - blacklist: Players from listed countries cannot join
  mode: 'blacklist'
  
  # List of country ISO codes (2 letters, uppercase)
  # Examples: US, GB, DE, FR, ES, MX, BR, AR, CL, etc.
  # You can find ISO codes here: https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2
  # Add one country per line using the format:
  #   - 'US'
  #   - 'GB'
  #   - 'DE'
  # Note about localhost/testing:
  # 'XX' is used as fallback (unknown country), common when testing locally.
  # - blacklist mode: keep 'XX' to block localhost/unknown connections
  # - whitelist mode: add 'XX' if you want localhost/unknown to be allowed
  countries:
    - 'XX'
  
  # Message sent to players when they are kicked
  # Supports color codes (&c for red, &a for green, etc.)
  kick-message: '&cYou cannot join from your country.'

# ============================================================
#                   VPN/Proxy Detection
# ============================================================
vpn-detection:
  # Enable VPN/Proxy detection
  # Uses proxycheck.io API (1000 free queries/day)
  # IMPORTANT: This works in Paper, Spigot standalone servers
  # For BungeeCord/Velocity, you MUST configure IP forwarding:
  #   - BungeeCord config.yml: ip_forward: true
  #   - Spigot spigot.yml: settings.bungeecord: true
  #   - Velocity: forward-secret configuration
  # Without IP forwarding, this plugin cannot get real player IPs
  # Note: localhost/private IPs (127.0.0.1, 10.x.x.x, 172.16-31.x.x, 192.168.x.x)
  # are treated as private and won't be flagged as VPN/Proxy.
  enabled: false
  
  # API key for proxycheck.io (optional, but recommended for better rate limits)
  # Get your free API key at: https://proxycheck.io/
  # Free tier: 1000 queries/day, 100 queries/burst
  # With API key: Better rate limits and more accurate results
  api-key: ''
  
  # Block players using VPN/Proxy when detected
  # Set to false to only log detections without blocking
  block-vpn: true
  
  # Check for VPN/Proxy on player login
  # If false, VPN detection only works with /geoplugin vpncheck command
  check-on-login: true
  
  # Message sent to players when they are kicked for using VPN
  # Supports color codes (&c for red, &a for green, etc.)
  kick-message: '&cVPN/Proxy connections are not allowed on this server.'
  
  # Cache duration in minutes (reduces API calls)
  # Results are cached to avoid repeatedly checking the same IP
  cache-duration-minutes: 60

  # Treat hosting/datacenter IPs as VPN/Proxy
  # Useful because some VPN providers are classified as "hosting"
  detect-hosting: true

  # Minimum risk score (0-100) to classify IP as VPN/Proxy
  # Set to 0 to disable risk-based blocking
  min-risk-score: 70
  
  # Whitelist specific IPs (useful for trusted VPNs)
  # Example: Your personal VPN, trusted players, etc.
  # Add one IP per line using this format:
  #   - '172.16.10.25'
  #   - '10.0.0.50'
  # Leave empty if you don't want to whitelist any IPs
  whitelist-ips:

# ============================================================
#              Suspicious Activity Detection
# ============================================================
# Detects suspicious patterns (multiple blocked attempts from same country)
# and sends alerts via configured webhooks (Discord/Custom)
# NOTE: This ONLY sends notifications. It does NOT change blocking behavior.
suspicious-activity:
  # Enable suspicious activity tracking and webhook alerts
  enabled: true
  
  # Number of blocked attempts to trigger webhook alert
  threshold: 5
  
  # Time window in minutes to count attempts
  # Example: 5 attempts in 10 minutes triggers webhook notification
  time-window-minutes: 10

# ============================================================
#                 Discord Webhook Integration
# ============================================================
discord:
  # Enable Discord webhook notifications
  enabled: false
  
  # Discord webhook URL
  # Create one in your Discord server: Server Settings > Integrations > Webhooks
  # Example: https://discord.com/api/webhooks/123456789/abcdefghijklmnop
  webhook-url: 'https://discord.com/api/webhooks/YOUR_WEBHOOK_URL'
  
  # Send notification when a player is blocked by country access control
  notify-on-block: true

  # Send notification when suspicious activity is detected
  notify-on-suspicious-activity: true
  
  # Send notification when a player is blocked for using VPN/Proxy
  notify-on-vpn: false
  
# ============================================================
#              Custom Webhook Integration
# ============================================================
# Use this for integration with automation platforms like n8n, Make, Zapier, etc.
custom-webhook:
  # Enable custom webhook notifications
  enabled: false
  
  # Your custom webhook URL
  # The plugin will send JSON payloads to this endpoint
  webhook-url: 'https://your-webhook-url.com/webhook'
  
  # Send notification when a player is blocked
  notify-on-block: true

  # Send notification when suspicious activity is detected
  notify-on-suspicious-activity: true

  # Send notification when a player is blocked for using VPN/Proxy
  notify-on-vpn: false
  
  # Custom headers (optional)
  # Useful for authentication tokens, API keys, etc.
  # Example:
  #   Authorization: 'Bearer your-token-here'
  #   X-API-Key: 'your-api-key'
  headers: {}
